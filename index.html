<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self'; manifest-src 'self'; base-uri 'none'; object-src 'none'" />
    <meta name="theme-color" content="#fff8f1" />
    <meta name="description" content="Sunny is a short, personalized reset for how you feel right now." />
    <meta name="color-scheme" content="light dark" />
    <script src="./theme-init.js"></script>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Figtree:wght@400..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Sunny — a small reset</title>
  </head>
  <body>
    <a class="skip-link" href="#app-screen">Skip to activity</a>
    <div class="ambient" aria-hidden="true">
      <span class="orb orb--one"></span>
      <span class="orb orb--two"></span>
      <span class="orb orb--three"></span>
      <span class="orb orb--four"></span>
    </div>

    <main class="site-shell">
      <section class="intro" aria-labelledby="site-title">
        <a class="brand" href="./" aria-label="Sunny home">
          <span class="brand__sun" aria-hidden="true"></span>
          <span id="site-title">Sunny</span>
        </a>
        <p class="intro__eyebrow">A small reset, shaped around you</p>
        <h1>Feel a little more like yourself.</h1>
        <p class="intro__copy">
          Check in, then follow three tiny steps. No streaks, scores, or pressure—just a few minutes for right now.
        </p>
        <div class="intro__proof" aria-label="App qualities">
          <span>About 3 minutes</span>
          <span>No account</span>
          <span>Private by design</span>
        </div>
        <button class="install-button" id="install-button" type="button" hidden>
          <span aria-hidden="true">↓</span> Install Sunny
        </button>
      </section>

      <section class="app-wrap" aria-label="Sunny wellbeing activity">
        <div class="phone" id="phone">
          <div class="phone__speaker" aria-hidden="true"></div>
          <div class="app-screen" id="app-screen" tabindex="-1">
            <noscript>
              <div class="noscript">Sunny needs JavaScript to guide your reset.</div>
            </noscript>
          </div>
        </div>
        <p class="privacy-note"><span aria-hidden="true">●</span> Your check-in stays on this device</p>
      </section>
    </main>

    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script src="./app.js" defer></script>
  </body>
</html>
